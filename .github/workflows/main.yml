name: Telegram Video Downloader Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install python-telegram-bot yt-dlp; fi

      - name: Run Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        # এখানে নিশ্চিত করছি ফাইলটি যেখানেই থাকুক খুঁজে নিয়ে রান করবে
        run: |
          FILE_PATH=$(find . -name "bot.py" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "Error: bot.py not found in any directory!"
            exit 1
          else
            python "$FILE_PATH"
          fi
